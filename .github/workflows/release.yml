name: release

# 推送 v* tag 自动触发：构建自包含单文件 → 打包完整发行包 → 创建 GitHub Release 并上传。
# 也可在 Actions 页手动触发（仅产出构建工件，不发布 Release）。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      # 可选 Authenticode 代码签名：在仓库 Settings → Secrets 配置后自动启用（彻底解决 SmartScreen/Defender 拦截）。
      SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}
      SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish GUI (self-contained single file — used for both the ZIP and bootstrap direct download)
        run: >
          dotnet publish src/WinDeploy.App/WinDeploy.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none --nologo -o dist/app

      - name: Publish CLI (self-contained single file)
        run: >
          dotnet publish src/WinDeploy.Cli/WinDeploy.Cli.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:DebugType=none --nologo -o dist/cli

      - name: Code sign binaries (only runs if a signing certificate secret is configured)
        if: ${{ env.SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'sign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          $signtool = Get-ChildItem 'C:/Program Files (x86)/Windows Kits/10/bin' -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -like '*x64*' } | Sort-Object FullName | Select-Object -Last 1
          if (-not $signtool) { throw 'signtool.exe not found on runner' }
          & $signtool.FullName sign /f $pfx /p $env:SIGN_PFX_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 `
            dist/app/WinDeploy.exe dist/cli/windeploy.exe
          Remove-Item $pfx -Force

      - name: Assemble release package
        id: pkg
        shell: pwsh
        run: |
          $tag  = '${{ github.ref_name }}'
          $name = "OwO-Win-Deployer-$tag-win-x64"
          $stage = "dist/$name"
          New-Item -ItemType Directory -Force -Path "$stage/assets" | Out-Null
          # GUI 用单文件版（运行库已并入 exe，发行目录只有一个 exe + 数据目录，整洁）
          Copy-Item dist/app/WinDeploy.exe "$stage/WinDeploy.exe" -Force
          # CLI 改名，避免 Windows 大小写不敏感与 WinDeploy.exe 同名冲突
          Copy-Item dist/cli/windeploy.exe "$stage/windeploy-cli.exe" -Force
          # 运行所需数据放在 exe 同级（程序向上查找 catalog/，再据此定位 repoRoot/assets）
          Copy-Item catalog      "$stage/catalog"      -Recurse -Force
          Copy-Item assets/icons "$stage/assets/icons" -Recurse -Force
          Copy-Item configs      "$stage/configs"      -Recurse -Force
          Copy-Item LICENSE      "$stage/LICENSE"      -Force
          Copy-Item README.md    "$stage/README.md"    -Force
          # 打包整个目录（含顶层文件夹），解压后得到一个干净的子目录而非一地散文件
          Compress-Archive -Path "$stage" -DestinationPath "dist/$name.zip" -Force
          "zip=dist/$name.zip" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OwO-Win-Deployer-win-x64
          path: ${{ steps.pkg.outputs.zip }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: OwO! Win Deployer ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.zip }}
            dist/app/WinDeploy.exe
          body: |
            ## OwO! Win Deployer ${{ github.ref_name }}

            一键在任意 Windows 设备上复刻开发环境、应用与个人配置。

            **下载（推荐用 ZIP）**
            - `OwO-Win-Deployer-${{ github.ref_name }}-win-x64.zip` —— **推荐**。完整发行包，解压得到一个干净目录：单文件 `WinDeploy.exe`（自包含免装 .NET）+ `windeploy-cli.exe` + `catalog/ configs/ assets/`。
            - `WinDeploy.exe` —— 仅 GUI 单文件，供裸机引导 `bootstrap.ps1` 直链下载；未签名时可能被 SmartScreen/Defender 提示「未知发布者」。

            > ⚠️ 程序未做代码签名时，Windows 可能提示「未知发布者」或被 Defender 拦截 —— 这属于无签名安装类软件的正常现象，可点「更多信息 → 仍要运行」，或参见 README 的「被拦截怎么办」。彻底解决需 Authenticode 代码签名（仓库已内置签名流水线，配置证书后自动生效）。
            >
            > 许可证：CC BY-NC-SA 4.0（署名 / 非商业 / 相同方式共享；作者保留商业权利）。
